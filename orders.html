<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your VK Clothing orders, view order history, and manage your recent purchases.">
  <meta name="keywords" content="VK Clothing Orders, Order History, Track Purchase, Buy Again">

  <link rel="stylesheet" href="css/style.css?????v=6">
  <style>
    .orders-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .order-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .order-header {
      background: var(--color-bg-soft);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--color-border);
      flex-wrap: wrap;
      gap: 16px;
    }
    .order-header-info {
      display: flex;
      gap: 32px;
      font-size: 0.9rem;
    }
    .order-header-info div {
      display: flex;
      flex-direction: column;
    }
    .order-header-info span:first-child {
      color: var(--color-text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }
    .order-header-info span:last-child {
      font-weight: 600;
    }
    .order-status-badge {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      background: #eee;
    }
    .order-status-badge.pending { background: #fff3cd; color: #856404; }
    .order-status-badge.processed { background: #d1ecf1; color: #0c5460; }
    .order-status-badge.shipped { background: #cce5ff; color: #004085; }
    .order-status-badge.delivered { background: #d4edda; color: #155724; }
    .order-status-badge.cancelled { background: #f8d7da; color: #721c24; }
    
    .order-items {
      padding: 24px 20px;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .order-item:last-child {
      margin-bottom: 0;
    }
    .order-item-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .order-item-left h4 {
      margin-bottom: 4px;
      font-size: 1.05rem;
    }
    .order-item-left p {
      color: var(--color-text-secondary);
      font-size: 0.9rem;
    }
    .order-item-right {
      text-align: right;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Header -->

          </div>

        <a href="cart.html" class="nav-icon" title="Cart">
