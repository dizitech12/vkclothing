<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - VKclothing</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    .success-container {
      max-width: 500px;
      margin: 80px auto;
      text-align: center;
      padding: 40px 20px;
      background: var(--color-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }
    .check-icon {
      width: 80px;
      height: 80px;
      background: var(--color-success, #4caf50);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .order-id-box {
      background: var(--color-bg-soft);
      padding: 16px;
      border-radius: 8px;
      margin: 24px 0;
      font-weight: 600;
      font-family: monospace;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="check-icon">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1 style="margin-bottom:16px;">Payment Successful!</h1>
    <p style="color:var(--color-text-secondary); margin-bottom:8px;">Thank you for your purchase. Your order has been placed securely.</p>
    
    <div class="order-id-box">
      Order ID: <span id="display-order-id">Loading...</span>
    </div>
    
    <p style="font-size:0.9rem; color:#666; margin-bottom: 32px;">You will receive an email/SMS confirmation shortly.</p>
    
    <a href="shop.html" class="btn btn-primary" style="width:100%;">Continue Shopping</a>
    <a href="orders.html" class="btn btn-outline" style="width:100%; margin-top: 12px;">View My Orders</a>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Clear cart
      localStorage.removeItem('vk_cart');
      
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('order_id');
      
      if (orderId) {
        document.getElementById('display-order-id').textContent = orderId;
        
        // Update Order to "Paid" in Google Sheets backend
        try {
          await API._get('updatePaymentStatus', { 
            orderId: orderId, 
            status: 'Paid'
          });
          console.log("Payment status confirmed locally for", orderId);
        } catch (e) {
          console.warn("Could not instantly sync payment status. Relying on webhook.", e);
        }
      } else {
        document.getElementById('display-order-id').textContent = 'Unknown';
      }
    });
  </script>
</body>
</html>
