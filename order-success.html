<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - VKclothing</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    body { background: #f6f6f6; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .success-box {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .check-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: #dcfce7;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .check-ring svg { width: 44px; height: 44px; stroke: #16a34a; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: #111; }
    .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 28px; }
    .order-id-box {
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 28px;
    }
    .order-id-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 4px; }
    .order-id-value { font-size: 1rem; font-weight: 700; font-family: monospace; color: #111; word-break: break-all; }
    .btn-primary {
      display: block; width: 100%;
      padding: 15px;
      background: #111; color: #fff;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .btn-secondary {
      display: block; width: 100%;
      padding: 14px;
      background: #fff; color: #111;
      border: 2px solid #e5e5e5; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .status-note { font-size: 0.8rem; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="success-box">
    <div class="check-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    
    <h1>Payment Successful!</h1>
    <p class="subtitle">Thank you! Your order has been placed and is being processed.</p>
    
    <div class="order-id-box">
      <div class="order-id-label">Order Reference</div>
      <div class="order-id-value" id="display-order-id">Loading...</div>
    </div>
    
    <a href="orders.html" class="btn-primary">View My Orders</a>
    <a href="shop.html" class="btn-secondary">Continue Shopping</a>
    
    <p class="status-note">You will receive a confirmation on your registered phone number.</p>
  </div>

  <script src="js/config.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Clear cart — prevents going back to a filled checkout
      localStorage.removeItem('vk_cart');

      // 2. Replace history so Back button goes to shop, not checkout/Cashfree
      history.replaceState(null, '', 'order-success.html');

      // 3. Get order_id from URL (Cashfree appends it)
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('order_id') || urlParams.get('orderId');

      if (!orderId) {
        document.getElementById('display-order-id').textContent = 'Order confirmed';
        return;
      }

      document.getElementById('display-order-id').textContent = orderId;

      // 4. VERIFY payment server-side — do NOT trust redirect alone
      try {
        const verifyRes = await fetch(`/api/verify-payment?order_id=${orderId}`);
        const verifyData = await verifyRes.json();

        if (verifyData.verified && verifyData.payment_status === 'SUCCESS') {
          // 5. Update order status to Paid in Google Sheets
          await API._get('updatePaymentStatus', {
            orderId: orderId,
            status: 'Paid',
            cfPaymentId: verifyData.cf_payment_id || ''
          });
          console.log('✅ Payment verified & order marked Paid:', orderId);
        } else {
          // Payment not confirmed yet (might still be processing)
          console.warn('⚠️ Payment not yet confirmed. Status:', verifyData.payment_status);
          // Webhook will handle the final confirmation
        }
      } catch (e) {
        console.warn('Server verification failed (webhook will handle):', e);
      }
    });
  </script>
</body>
</html>
