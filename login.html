<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your VK Clothing account to manage orders, wishlist, and shipping addresses.">
  <meta name="keywords" content="VK Clothing Login, Sign In, Customer Account, User Profile">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <title>Login | VK Clothing</title>
  <!-- Change version number when updating files to force reload -->
  <link rel="stylesheet" href="css/style.css?????v=6">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .auth-card {
      background: var(--color-bg);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--color-border-light);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .auth-toggle-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      font-weight: 600;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.3s;
    }
    .auth-toggle-btn.active {
      color: var(--color-text);
      border-bottom-color: #000;
    }
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <!-- Minimal Header for Checkout/Login Flow -->
  <header class="navbar" id="navbar">
    <div class="container navbar-container" style="justify-content: center;">
      <a href="index.html" class="logo">VKclothing</a>
    </div>
  </header>

  <main style="padding-top: 80px;">
    <div class="auth-container">
      <div class="auth-card">

        <a href="javascript:history.back()" class="btn btn-sm btn-outline" style="margin-bottom:16px; display:inline-flex; align-items:center; gap:8px;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          Back
        </a>

        <div class="auth-header">
          <h2 id="auth-title">Welcome Back</h2>
          <p id="auth-subtitle" style="color:var(--color-text-secondary); margin-top:8px;">Enter your details to sign in.</p>
        </div>

        <div class="auth-toggle">
          <button class="auth-toggle-btn active" id="btn-tab-login" onclick="switchAuthTab('login')">Login</button>
          <button class="auth-toggle-btn" id="btn-tab-register" onclick="switchAuthTab('register')">Sign Up</button>
        </div>

        <div id="auth-message" class="form-message"></div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)">
          
          <div class="form-group">
            <label for="phone-input">Phone Number</label>
            <input type="tel" id="phone-input" placeholder="e.g. 9876543210" pattern="[0-9]{10}" title="10 digit phone number" required>
          </div>

          <div class="form-group">
            <label for="password-input">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password-input" placeholder="••••••••" minlength="6" required>
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">Show</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="auth-submit-btn" style="width:100%; margin-top:16px;">
            Sign In
          </button>
        </form>

      </div>
    </div>
  </main>

  <script src="js/config.js?????v=6"></script>
  <script src="js/ui-utils.js?????v=6"></script>
  <script src="js/api.js?????v=6"></script>
  <script src="js/auth.js?????v=6"></script>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        
        <div class="footer-policies" style="margin-bottom: 15px; display:flex; gap:20px; flex-wrap:wrap; justify-content:center; opacity:0.8; font-size:0.85rem;">
          <a href="refund-policy.html">Refund Policy</a>
          <a href="shipping-policy.html">Shipping Policy</a>
          <a href="privacy-policy.html">Privacy Policy</a>
          <a href="terms.html">Terms & Conditions</a>
        </div>
        <div style="text-align:center; opacity:0.6; font-size:0.8rem;">&copy; 2026 VKclothing. All rights reserved.</div>
      </div>
    </div>
  </footer>
</body>
</html>
